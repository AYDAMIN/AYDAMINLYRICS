    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, 'Segoe UI', system-ui, sans-serif;
            background: #020205;
            color: #ededf0;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background-color 0.4s ease;
        }

        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: radial-gradient(circle at 20% 30%, #0a0a1a, #010105);
            transition: background 0.8s ease;
        }

        /* ✅ CANVAS PARTICLES */
        #particlesCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* Плавные анимации */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .app {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px 20px 100px;
            position: relative;
            z-index: 2;
        }

        .hero {
            text-align: center;
            padding: 40px 0 32px;
        }

        /* ✅ НОВЫЙ ШРИФТ UNBOUNDED ДЛЯ ЛОГОТИПА */
        .logo {
            font-family: 'Unbounded', sans-serif;
            font-weight: 900;
            font-size: clamp(2.2rem, 10vw, 3.8rem);
            letter-spacing: 6px;
            background: linear-gradient(135deg, #ffffff, #b7aaff, #6c4eff, #ff99cc, #ffffff);
            background-size: 300% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shimmer 6s linear infinite;
            text-transform: uppercase;
            cursor: pointer;
        }

        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glow-text {
            font-size: 0.75rem;
            opacity: 0.6;
            letter-spacing: 3px;
            margin-top: 8px;
        }

        .section {
            background: rgba(12, 10, 25, 0.55);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 20px 18px;
            margin-bottom: 24px;
            border: 1px solid rgba(100, 80, 255, 0.2);
        }

        .section-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #9d8eff;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ✅ CSS CONTAINMENT */
        .albums-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
            content-visibility: auto;
            contain-intrinsic-size: 500px;
        }

        .album-item {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 16px;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(4px);
            border-radius: 28px;
            padding: 10px 16px 10px 12px;
            cursor: pointer;
            transition: all 0.25s;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .album-item:hover {
            transform: translateX(6px);
            background: rgba(30, 20, 70, 0.7);
            border-color: rgba(130, 100, 255, 0.5);
        }

        .album-cover-mini {
            width: 56px;
            height: 56px;
            border-radius: 20px;
            object-fit: cover;
            background: #1a1a2a;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.3);
        }

        .album-info { flex: 1; }
        .album-name { font-weight: 700; font-size: 1.1rem; }
        .album-year { font-size: 0.7rem; opacity: 0.6; }
        .album-expand { color: #9d8eff; font-size: 1.2rem; }

        .tracks-container {
            width: 100%;
            margin-top: 12px;
            display: none;
            flex-direction: column;
            gap: 8px;
            animation: slideDown 0.3s ease;
            content-visibility: auto;
            contain-intrinsic-size: 200px;
        }

        .tracks-container.open { display: flex; }

        .track-btn, .about-album-btn {
            background: rgba(20, 18, 40, 0.8);
            border: none;
            padding: 12px 16px;
            border-radius: 28px;
            color: white;
            font-size: 0.9rem;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
        }

        .track-btn:hover, .about-album-btn:hover {
            background: rgba(80, 60, 200, 0.7);
            transform: translateX(6px);
        }

        .streaming-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .stream-btn {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            padding: 8px 18px;
            border-radius: 50px;
            color: #e0e0ff;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 500;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .stream-btn:hover {
            background: #6c4eff;
            color: white;
            transform: scale(1.02);
        }

        /* Кнопка установить снизу */
        .install-footer {
            text-align: center;
            margin: 30px 0 20px;
        }

        .install-btn-pwa {
            background: linear-gradient(135deg, #6c4eff, #a855f7);
            border: none;
            color: white;
            padding: 14px 28px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            max-width: 280px;
            transition: 0.2s;
            animation: fadeInUp 0.4s ease-out;
        }

        .install-btn-pwa:hover {
            transform: scale(1.02);
            box-shadow: 0 0 12px rgba(108, 78, 255, 0.6);
        }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: rgba(15, 15, 30, 0.95);
            border-radius: 48px;
            padding: 32px 24px;
            max-width: 360px;
            width: 90%;
            border: 1px solid rgba(150, 120, 255, 0.4);
            text-align: center;
        }

        .modal-content h3 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #fff, #b7aaff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .modal-platforms {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0;
        }

        .modal-platforms button {
            background: rgba(30, 30, 60, 0.8);
            border: none;
            padding: 14px 16px;
            border-radius: 60px;
            color: white;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
        }

        .modal-platforms button:hover {
            background: #6c4eff;
            transform: scale(1.02);
        }

        .ios-guide {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            padding: 16px;
            margin: 10px 0;
            border: 1px dashed rgba(255, 255, 255, 0.2);
        }

        .ios-guide p { font-size: 0.85rem; margin-bottom: 12px; color: #ccc; }

        .ios-guide-steps {
            display: flex;
            align-items: center;
            justify-content: space-around;
            margin: 15px 0;
        }

        .ios-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .ios-step i { font-size: 2rem; color: #6c4eff; }
        .ios-step span { font-size: 0.7rem; color: #aaa; }

        .close-modal {
            background: rgba(100, 80, 255, 0.3);
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
        }

        .close-modal:hover { background: #ff4d4d; }

        .screen {
            display: none;
            min-height: 100vh;
            padding: 30px 20px;
            animation: fadeIn 0.4s ease;
        }

        .screen.active { display: block; }

        .back-btn {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 60px;
            font-size: 24px;
            color: white;
            cursor: pointer;
            margin-bottom: 24px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .back-btn:hover {
            background: #6c4eff;
            transform: scale(1.05);
        }

        .song-card {
            background: rgba(8, 6, 18, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 32px 24px;
            border: 1px solid rgba(150, 120, 255, 0.3);
            animation: scaleIn 0.4s ease-out;
        }

        /* Кнопка поделиться над текстом */
        .share-btn-container {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 16px;
        }

        .share-btn {
            background: rgba(108, 78, 255, 0.3);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .share-btn:hover {
            background: #6c4eff;
            transform: scale(1.02);
        }

        .share-btn i { font-size: 1rem; }

        .song-title {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff, #c4b5ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .song-lyrics {
            line-height: 1.7;
            font-size: 1rem;
            white-space: pre-line;
            font-family: monospace;
        }

        .footer-note {
            text-align: center;
            font-size: 0.65rem;
            opacity: 0.35;
            margin-top: 20px;
        }

        .loader {
            text-align: center;
            padding: 40px;
            color: #9d8eff;
        }

        .loader i { animation: spin 1s linear infinite; }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .retry-btn {
            background: #6c4eff;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            margin-top: 15px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .retry-btn:hover { background: #8b7aff; }

        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 0.9rem;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            border: 1px solid #6c4eff;
        }

        .toast.show { opacity: 1; }
    </style>
</head>
<body>
    <div class="animated-bg" id="animatedBg"></div>
    <canvas id="particlesCanvas"></canvas>
    <div id="toast" class="toast">🔗 Ссылка скопирована!</div>

    <!-- Модальное окно установки -->
    <div id="installModal" class="modal">
        <div class="modal-content">
            <h3><i class="fas fa-download"></i> Установить приложение</h3>
            <div class="modal-platforms">
                <button id="pwaInstallBtn"><i class="fab fa-android"></i> Добавить на главный экран (Android)</button>
                <button id="iosGuideShowBtn"><i class="fab fa-apple"></i> Добавить на главный экран (iPhone)</button>
                <button id="rustoreBtn"><i class="fas fa-store"></i> Скоро в RuStore</button>
                <button id="nashstoreBtn"><i class="fas fa-store"></i> Скоро в NashStore</button>
            </div>
            <div id="iosGuidePanel" class="ios-guide" style="display: none;">
                <p><i class="fab fa-apple"></i> <strong>Инструкция для iPhone/iPad:</strong></p>
                <div class="ios-guide-steps">
                    <div class="ios-step"><i class="fas fa-share-square"></i><span>1. Поделиться</span></div>
                    <div class="ios-step"><i class="fas fa-arrow-right"></i><span></span></div>
                    <div class="ios-step"><i class="fas fa-plus-square"></i><span>2. На экран Домой</span></div>
                    <div class="ios-step"><i class="fas fa-arrow-right"></i><span></span></div>
                    <div class="ios-step"><i class="fas fa-check-circle"></i><span>3. Готово!</span></div>
                </div>
                <p style="font-size: 0.75rem; opacity: 0.7;">Откройте сайт в Safari, нажмите «Поделиться» → «На экран Домой»</p>
            </div>
            <button class="close-modal" id="closeModalBtn">Закрыть</button>
        </div>
    </div>

    <!-- Основной экран -->
    <div id="mainScreen" class="app screen active">
        <div class="hero">
            <div class="logo" id="mainLogo">AYDAMIN</div>
            <div class="glow-text">ТЕКСТЫ ПЕСЕН</div>
        </div>

        <div class="section">
            <div class="section-title"><i class="fas fa-compact-disc"></i> АЛЬБОМЫ</div>
            <div class="albums-list" id="albumsList">
                <div class="loader"><i class="fas fa-spinner"></i> Загрузка...</div>
            </div>
        </div>

        <div class="section">
            <div class="section-title"><i class="fas fa-headphones"></i> СЛУШАТЬ НА ПЛОЩАДКАХ</div>
            <div class="streaming-grid" id="streamingLinks"></div>
        </div>

        <!-- Кнопка установить снизу -->
        <div class="install-footer">
            <button class="install-btn-pwa" id="openInstallModalBtn"><i class="fas fa-download"></i> Установить приложение</button>
        </div>

        <div class="footer-note">AYDAMIN © 2026 // ALL RIGHTS RESERVED</div>
    </div>

    <!-- Экран песни -->
    <div id="songScreen" class="screen">
        <button class="back-btn" id="backToMainBtn"><i class="fas fa-arrow-left"></i></button>
        <div class="song-card">
            <div class="share-btn-container">
                <button class="share-btn" id="shareSongBtn"><i class="fas fa-share-alt"></i> Поделиться</button>
            </div>
            <div class="song-title" id="songTitle"></div>
            <div class="song-lyrics" id="songLyrics"></div>
        </div>
    </div>

    <!-- Экран об альбоме -->
    <div id="aboutScreen" class="screen">
        <button class="back-btn" id="backFromAboutBtn"><i class="fas fa-arrow-left"></i></button>
        <div class="song-card">
            <div class="song-title">ОБ АЛЬБОМЕ</div>
            <div class="song-lyrics" id="aboutText"></div>
        </div>
    </div>

    <script>
        (function(){
            "use strict";

            // ---------- КЭШИРОВАНИЕ DOM ----------
            const DOM = {
                mainScreen: document.getElementById('mainScreen'),
                songScreen: document.getElementById('songScreen'),
                aboutScreen: document.getElementById('aboutScreen'),
                albumsList: document.getElementById('albumsList'),
                streamingLinks: document.getElementById('streamingLinks'),
                installModal: document.getElementById('installModal'),
                openInstallModalBtn: document.getElementById('openInstallModalBtn'),
                closeModalBtn: document.getElementById('closeModalBtn'),
                pwaInstallBtn: document.getElementById('pwaInstallBtn'),
                animatedBg: document.getElementById('animatedBg'),
                shareSongBtn: document.getElementById('shareSongBtn'),
                toast: document.getElementById('toast'),
                songTitle: document.getElementById('songTitle'),
                songLyrics: document.getElementById('songLyrics'),
                aboutText: document.getElementById('aboutText'),
                backToMainBtn: document.getElementById('backToMainBtn'),
                backFromAboutBtn: document.getElementById('backFromAboutBtn'),
                iosGuidePanel: document.getElementById('iosGuidePanel'),
                rustoreBtn: document.getElementById('rustoreBtn'),
                nashstoreBtn: document.getElementById('nashstoreBtn'),
                iosGuideShowBtn: document.getElementById('iosGuideShowBtn'),
                particlesCanvas: document.getElementById('particlesCanvas')
            };

            // ---------- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ----------
            let albumsData = null;
            let deferredPrompt = null;
            let colorChangeTimeout = null;
            let currentSongUrl = '';
            let particlesArray = [];
            let animationFrame = null;
            let resizeDebounceTimeout = null;

            // ---------- DEBOUNCE (РЕСАЙЗ) ----------
            function debounce(func, delay) {
                let timeout;
                return (...args) => {
                    clearTimeout(timeout);
                    timeout = setTimeout(() => func.apply(this, args), delay);
                };
            }

            // ---------- МОДАЛЬНОЕ ОКНО ----------
            DOM.openInstallModalBtn.addEventListener('click', () => {
                DOM.installModal.classList.add('active');
                if (DOM.iosGuidePanel) DOM.iosGuidePanel.style.display = 'none';
            });
            DOM.closeModalBtn.addEventListener('click', () => DOM.installModal.classList.remove('active'));
            DOM.installModal.addEventListener('click', (e) => { if (e.target === DOM.installModal) DOM.installModal.classList.remove('active'); });

            DOM.iosGuideShowBtn.addEventListener('click', () => {
                const panel = DOM.iosGuidePanel;
                panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
            });

            DOM.rustoreBtn.addEventListener('click', () => alert('Приложение скоро появится в RuStore!'));
            DOM.nashstoreBtn.addEventListener('click', () => alert('Приложение скоро появится в NashStore!'));

            window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; });
            DOM.pwaInstallBtn.addEventListener('click', async () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    await deferredPrompt.userChoice;
                    deferredPrompt = null;
                    DOM.installModal.classList.remove('active');
                } else {
                    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
                    if (isIOS) DOM.iosGuidePanel.style.display = 'block';
                    else alert('Используйте "Добавить на главный экран" в меню браузера');
                }
            });

            // ---------- ПОДЕЛИТЬСЯ ТРЕКОМ (НАТИВНЫЙ ШАРИНГ + FALLBACK) ----------
DOM.shareSongBtn.addEventListener('click', () => {
    const songTitle = DOM.songTitle.innerText;
    const songText = DOM.songLyrics.innerText;
    
    // Берём первые 32 символа текста (обрезаем на пробеле, чтобы не рвать слова)
    const previewText = songText.length > 32 
        ? songText.substring(0, 32).split(' ').slice(0, -1).join(' ') + '...' 
        : songText;

    const shareData = {
        title: songTitle,
        text: `${songTitle}\n\n${previewText}`,
        url: currentSongUrl
    };

    // Проверяем, поддерживает ли браузер нативный шаринг
    if (navigator.share) {
        navigator.share(shareData)
            .catch((error) => {
                if (error.name !== 'AbortError') {
                    fallbackCopy();
                }
            });
    } else {
        fallbackCopy();
    }

    function fallbackCopy() {
        navigator.clipboard.writeText(currentSongUrl).then(() => {
            DOM.toast.textContent = '🔗 Ссылка скопирована!';
            DOM.toast.classList.add('show');
            setTimeout(() => DOM.toast.classList.remove('show'), 2000);
        }).catch(() => alert('Не удалось скопировать ссылку'));
    }
});

            // ---------- ЦВЕТ ОБЛОЖКИ (С ДЕСТРУКТУРИЗАЦИЕЙ) ----------
            function getDominantColor(imageUrl, callback) {
                const img = new Image();
                img.crossOrigin = "Anonymous";
                img.src = imageUrl;
                img.onload = () => {
                    try {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const maxSize = 50;
                        const ratio = Math.min(maxSize / img.width, maxSize / img.height);
                        canvas.width = img.width * ratio;
                        canvas.height = img.height * ratio;
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        const { data } = ctx.getImageData(0, 0, canvas.width, canvas.height);
                        let r = 0, g = 0, b = 0, count = 0;
                        for (let i = 0; i < data.length; i += 4) {
                            r += data[i];
                            g += data[i+1];
                            b += data[i+2];
                            count++;
                        }
                        callback(`rgb(${Math.floor(r/count)}, ${Math.floor(g/count)}, ${Math.floor(b/count)})`);
                    } catch (e) { callback(null); }
                };
                img.onerror = () => callback(null);
            }

            function applyColorToBackground(rgbColor) {
                if (!rgbColor) return;
                clearTimeout(colorChangeTimeout);
                colorChangeTimeout = setTimeout(() => {
                    DOM.animatedBg.style.background = `radial-gradient(circle at 20% 30%, ${rgbColor}, #010105)`;
                }, 50);
            }

            function resetBackgroundColor() {
                DOM.animatedBg.style.background = 'radial-gradient(circle at 20% 30%, #0a0a1a, #010105)';
            }

            // ---------- ЗАГРУЗКА ДАННЫХ (ASYNC/AWAIT) ----------
            async function loadData() {
                showLoader();
                try {
                    const response = await fetch('albums.json');
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const data = await response.json();
                    if (!data.albums || !Array.isArray(data.albums)) throw new Error('Неверная структура');
                    albumsData = data;
                    renderAlbums();
                    renderStreaming();
                } catch (error) {
                    console.error('Ошибка загрузки:', error);
                    showErrorState();
                }
            }

            function showLoader() { DOM.albumsList.innerHTML = '<div class="loader"><i class="fas fa-spinner"></i> Загрузка...</div>'; }
            function showErrorState() {
                DOM.albumsList.innerHTML = `<div style="padding:20px;text-align:center"><i class="fas fa-exclamation-triangle" style="color:#ff6b6b;font-size:2rem;"></i><p style="margin:10px 0;">Ошибка загрузки</p><button class="retry-btn" onclick="location.reload()"><i class="fas fa-redo"></i> Повторить</button></div>`;
                DOM.streamingLinks.innerHTML = '<div style="padding:10px;text-align:center;opacity:0.5">—</div>';
            }

            // ---------- РЕНДЕР АЛЬБОМОВ (С ДЕСТРУКТУРИЗАЦИЕЙ) ----------
            function renderAlbums() {
                if (!albumsData?.albums) return;
                DOM.albumsList.innerHTML = '';
                albumsData.albums.forEach(album => {
                    const { name, year = '2026', cover, songs, about } = album;
                    const albumDiv = document.createElement('div'); albumDiv.className = 'album-item';
                    const coverImg = document.createElement('img'); 
                    coverImg.src = cover; coverImg.alt = name; coverImg.className = 'album-cover-mini'; 
                    coverImg.loading = 'lazy'; 
                    coverImg.onerror = () => coverImg.src = 'https://picsum.photos/id/1/200/200';
                    
                    const infoDiv = document.createElement('div'); infoDiv.className = 'album-info';
                    infoDiv.innerHTML = `<div class="album-name">${name}</div><div class="album-year">${year}</div>`;
                    const expandIcon = document.createElement('div'); expandIcon.className = 'album-expand';
                    expandIcon.innerHTML = '<i class="fas fa-chevron-down"></i>';
                    
                    albumDiv.append(coverImg, infoDiv, expandIcon);
                    const tracksWrapper = document.createElement('div'); tracksWrapper.className = 'tracks-container';
                    
                    songs?.forEach(song => {
                        const btn = document.createElement('button'); btn.className = 'track-btn';
                        btn.innerHTML = `<i class="fas fa-music"></i> ${song.title}`;
                        btn.addEventListener('click', e => { e.stopPropagation(); showSong(album, song); });
                        tracksWrapper.appendChild(btn);
                    });
                    
                    const aboutBtn = document.createElement('button'); aboutBtn.className = 'about-album-btn';
                    aboutBtn.innerHTML = '<i class="fas fa-info-circle"></i> Об альбоме';
                    aboutBtn.addEventListener('click', e => { e.stopPropagation(); showAbout(album); });
                    tracksWrapper.appendChild(aboutBtn);
                    albumDiv.appendChild(tracksWrapper);
                    
                    albumDiv.addEventListener('click', e => {
                        if (e.target.closest('.track-btn') || e.target.closest('.about-album-btn')) return;
                        const isOpen = tracksWrapper.classList.contains('open');
                        document.querySelectorAll('.tracks-container').forEach(c => c.classList.remove('open'));
                        if (!isOpen) tracksWrapper.classList.add('open');
                        getDominantColor(cover, color => { if (color) applyColorToBackground(color); });
                    });
                    
                    DOM.albumsList.appendChild(albumDiv);
                });
            }

            function renderStreaming() {
                if (!albumsData?.streaming) return;
                DOM.streamingLinks.innerHTML = '';
                const platforms = [
                    { key: 'spotify', icon: 'fab fa-spotify', name: 'Spotify' },
                    { key: 'vk', icon: 'fab fa-vk', name: 'VK' },
                    { key: 'yandex', icon: 'fab fa-yandex', name: 'Яндекс' },
                    { key: 'sber', icon: 'fas fa-music', name: 'Звук' }
                ];
                platforms.forEach(({ key, icon, name }) => {
                    const url = albumsData.streaming[key];
                    if (url && url !== '#') {
                        const a = document.createElement('a');
                        a.href = url; a.target = '_blank'; a.className = 'stream-btn';
                        a.innerHTML = `<i class="${icon}"></i> ${name}`;
                        DOM.streamingLinks.appendChild(a);
                    }
                });
            }

            function showSong(album, song) {
                DOM.songTitle.innerText = song.title;
                DOM.songLyrics.innerText = song.text;
                currentSongUrl = `${location.origin}${location.pathname}#song/${encodeURIComponent(song.title)}`;
                DOM.mainScreen.classList.remove('active');
                DOM.songScreen.classList.add('active');
                DOM.aboutScreen.classList.remove('active');
                history.pushState({ screen: 'song', album: album.name, song: song.title }, '', currentSongUrl);
            }

            function showAbout(album) {
                DOM.aboutText.innerText = album.about || 'Информация отсутствует';
                DOM.mainScreen.classList.remove('active');
                DOM.aboutScreen.classList.add('active');
                DOM.songScreen.classList.remove('active');
                history.pushState({ screen: 'about', album: album.name }, '', `#about/${encodeURIComponent(album.name)}`);
            }

            // ---------- НАВИГАЦИЯ (ИСПРАВЛЕННАЯ КНОПКА НАЗАД) ----------
            function goToMain() {
                DOM.mainScreen.classList.add('active');
                DOM.songScreen.classList.remove('active');
                DOM.aboutScreen.classList.remove('active');
                document.querySelectorAll('.tracks-container').forEach(c => c.classList.remove('open'));
                resetBackgroundColor();
            }

            DOM.backToMainBtn.addEventListener('click', goToMain);
            DOM.backFromAboutBtn.addEventListener('click', goToMain);

            history.replaceState({ screen: 'main' }, '', '/');
            history.pushState({ screen: 'main' }, '', '/');
            
            window.addEventListener('popstate', (event) => {
                if (event.state) {
                    if (!DOM.mainScreen.classList.contains('active')) goToMain();
                } else {
                    if (!DOM.mainScreen.classList.contains('active')) {
                        goToMain();
                        history.replaceState({ screen: 'main' }, '', '/');
                    }
                }
            });

            // ---------- CANVAS PARTICLES ----------
            function initParticles() {
                const canvas = DOM.particlesCanvas;
                const ctx = canvas.getContext('2d');
                let width = window.innerWidth;
                let height = window.innerHeight;
                
                function resizeCanvas() {
                    width = window.innerWidth;
                    height = window.innerHeight;
                    canvas.width = width;
                    canvas.height = height;
                    initParticleArray();
                }
                
                function initParticleArray() {
                    const count = width < 768 ? 25 : 45;
                    particlesArray = [];
                    for (let i = 0; i < count; i++) {
                        particlesArray.push({
                            x: Math.random() * width,
                            y: Math.random() * height,
                            size: Math.random() * 6 + 2,
                            speedY: Math.random() * 1.5 + 0.5,
                            speedX: Math.random() * 0.4 - 0.2,
                            opacity: Math.random() * 0.4 + 0.2,
                            color: `rgba(${100 + Math.random() * 100}, ${80 + Math.random() * 100}, 255, OPACITY)`
                        });
                    }
                }
                
                function drawParticles() {
                    ctx.clearRect(0, 0, width, height);
                    particlesArray.forEach(p => {
                        p.y -= p.speedY;
                        p.x += p.speedX;
                        if (p.y < -20) { p.y = height + 20; p.x = Math.random() * width; }
                        if (p.x < -20) p.x = width + 20;
                        if (p.x > width + 20) p.x = -20;
                        
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        ctx.fillStyle = p.color.replace('OPACITY', p.opacity);
                        ctx.fill();
                        ctx.filter = 'blur(3px)';
                    });
                    ctx.filter = 'none';
                    animationFrame = requestAnimationFrame(drawParticles);
                }
                
                const debouncedResize = debounce(() => {
                    resizeCanvas();
                }, 200);
                
                window.addEventListener('resize', debouncedResize);
                resizeCanvas();
                animationFrame = requestAnimationFrame(drawParticles);
            }

            // ---------- ЗАПУСК ----------
            initParticles();
            loadData();
            if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
        })();
    </script>
</body>
